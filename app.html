
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daily Notes</title>

  <style>

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f6f9;
      color: #333;
    }

    header {
      background: white;
      padding: 18px 30px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
    }

    header h1 {
      margin: 0;
      font-size: 24px;
    }

    .container {
      max-width: 800px;
      margin: 40px auto;
      padding: 0 20px;
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    textarea {
      width: 100%;
      height: 180px;
      padding: 14px;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 16px;
      resize: vertical;
    }

    button {
      margin-top: 16px;
      padding: 12px 20px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
      background: #222;
      color: white;
    }

    button:hover {
      opacity: 0.9;
    }

    .status {
      margin-top: 15px;
      font-size: 14px;
    }

  </style>
</head>
<body>

  <header>
    <h1>Daily Notes</h1>
  </header>

  <div class="container">

    <div class="card">

      <h2>Write Today's Note</h2>

      <textarea id="note" placeholder="Write your thoughts here..."></textarea>

      <button onclick="saveNote()">
        Save Note
      </button>

      <div class="status" id="status"></div>

    </div>

  </div>

  <script src="config.js">

    // =============================
    // CONFIGURATION
    // =============================

    //const GITHUB_TOKEN = "";

    const OWNER = "uttaman";

    const REPO = "daily-notes";

    const FILE_PATH = "notes.json";


    async function saveNote() {

      const noteText = document.getElementById("note").value.trim();

      const status = document.getElementById("status");

      if (!noteText) {
        status.innerText = "Please write something.";
        return;
      }

      status.innerText = "Saving...";

      try {

        // =============================
        // GET EXISTING FILE
        // =============================

        const getResponse = await fetch(
          `https://api.github.com/repos/${OWNER}/${REPO}/contents/${FILE_PATH}`,
          {
            headers: {
              Authorization: `Bearer ${GITHUB_TOKEN}`,
              Accept: "application/vnd.github+json"
            }
          }
        );

        const fileData = await getResponse.json();

        const sha = fileData.sha;

        const existingContent = JSON.parse(
          atob(fileData.content)
        );

        // =============================
        // ADD NEW NOTE
        // =============================

        existingContent.push({
          note: noteText,
          createdAt: new Date().toISOString()
        });

        const updatedContent = btoa(
          JSON.stringify(existingContent, null, 2)
        );

        // =============================
        // UPDATE FILE
        // =============================

        const updateResponse = await fetch(
          `https://api.github.com/repos/${OWNER}/${REPO}/contents/${FILE_PATH}`,
          {
            method: "PUT",
            headers: {
              Authorization: `Bearer ${GITHUB_TOKEN}`,
              "Content-Type": "application/json"
            },
            body: JSON.stringify({
              message: "Added daily note",
              content: updatedContent,
              sha: sha
            })
          }
        );

        if (updateResponse.ok) {
          status.innerText = "Note saved successfully.";
          document.getElementById("note").value = "";
        } else {
          status.innerText = "Failed to save note.";
        }

      } catch (err) {
        console.error(err);
        status.innerText = "Error occurred.";
      }
    }

  </script>

</body>
</html>
